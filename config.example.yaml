api_host: "127.0.0.1"
api_port: 8765
mcp_host: "127.0.0.1"
mcp_port: 8766
request_timeout_seconds: 120
connect_timeout_seconds: 30
conversion_timeout_seconds: 600
poll_interval_seconds: 1
max_file_bytes: 536870912
# auth_token: "change-me-if-you-bind-beyond-localhost"
# Or export TOOLHUB_AUTH_TOKEN="change-me-if-you-bind-beyond-localhost"

backends:
  convertx:
    enabled: true
    base_url: "http://127.0.0.1:3000"
    work_root: "/home/shinku/data/service/tool/agent-tools-gateway/tools/ConvertX/work"
    allowed_input_roots:
      - "/home/shinku/data/service/tool/agent-tools-gateway/tools/ConvertX/work/input"
    allowed_output_roots:
      - "/home/shinku/data/service/tool/agent-tools-gateway/tools/ConvertX/work/output"
    temp_root: "/home/shinku/data/service/tool/agent-tools-gateway/tools/ConvertX/work/tmp"
  webcapture:
    enabled: false
    base_url: "http://127.0.0.1:3001"
    token: "change-me-browserless-token"
    work_root: "/home/shinku/data/service/tool/agent-tools-gateway/tools/WebCapture/work"
    allowed_output_roots:
      - "/home/shinku/data/service/tool/agent-tools-gateway/tools/WebCapture/work/output"
    temp_root: "/home/shinku/data/service/tool/agent-tools-gateway/tools/WebCapture/work/tmp"
    browser_timeout_seconds: 120
    post_load_wait_ms: 1000
    viewport_width: 1440
    viewport_height: 1024
    pdf_format: "A4"
    block_private_networks: true
